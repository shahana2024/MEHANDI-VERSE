<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MehndiVerse · sliding admin panel</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8efe6;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #2e1c12;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== TOP NAVIGATION BAR ========== */
        .top-nav {
            background: #ffffffec;
            backdrop-filter: blur(12px);
            border-bottom: 4px solid #cf8b5e;
            padding: 0 30px;
            box-shadow: 0 8px 20px -10px #8f5e3f;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #bc6137, #dF7a4a);
            border-radius: 16px 4px 20px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #7f4023;
        }

        .logo-icon i {
            font-size: 28px;
            color: #fff3e0;
        }

        .logo-text h2 {
            font-size: 1.9rem;
            font-weight: 650;
            color: #562f18;
            line-height: 1.2;
        }

        .logo-text span {
            font-size: 11px;
            color: #a47558;
            letter-spacing: 1px;
        }

        /* sliding menu toggle button */
        .menu-toggle {
            background: #eacbb6;
            border: none;
            padding: 12px 22px;
            border-radius: 50px;
            font-size: 1.4rem;
            color: #572f18;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            border: 2px solid #c88255;
            transition: 0.2s;
        }

        .menu-toggle:hover {
            background: #ddb595;
            transform: scale(1.02);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-link {
            text-decoration: none;
            color: #4e2f1b;
            font-weight: 550;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 40px;
            transition: 0.2s;
        }

        .nav-link i {
            color: #bd6539;
        }

        .nav-link:hover {
            background: #f2d9c4;
        }

        .admin-badge {
            background: #d28d64;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-badge i {
            color: #ffdbb8;
        }

        /* ========== SLIDING SIDEBAR WINDOW ========== */
        .sliding-sidebar {
            position: fixed;
            top: 0;
            left: -340px;
            width: 300px;
            height: 100vh;
            background: #261c14;
            color: #edd0b5;
            z-index: 1000;
            transition: left 0.3s ease-in-out;
            box-shadow: 4px 0 30px rgba(0,0,0,0.5);
            padding: 30px 0 20px;
            display: flex;
            flex-direction: column;
            border-right: 5px solid #b56738;
        }

        .sliding-sidebar.open {
            left: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px 25px;
            border-bottom: 2px solid #4d3727;
            margin-bottom: 20px;
        }

        .sidebar-header h3 {
            font-size: 2rem;
            color: #f3cca9;
        }

        .close-sidebar {
            background: none;
            border: none;
            color: #d9a57b;
            font-size: 2rem;
            cursor: pointer;
        }

        .sidebar-menu {
            list-style: none;
            flex: 1;
            padding: 0 16px;
        }

        .sidebar-menu li {
            margin: 8px 0;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 14px 20px;
            color: #eccdaf;
            text-decoration: none;
            font-size: 1.2rem;
            border-radius: 30px 6px 30px 6px;
            transition: 0.2s;
        }

        .sidebar-menu a i {
            width: 30px;
            color: #cb8e63;
        }

        .sidebar-menu a:hover {
            background: #3f2d1f;
            color: #ffdbb8;
        }

        .sidebar-footer {
            padding: 25px 20px 15px;
            border-top: 2px solid #4f3826;
        }

        /* overlay when sidebar open */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(3px);
            z-index: 999;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        /* ========== MAIN CONTENT AREA (no dashboard) ========== */
        .main-area {
            flex: 1;
            max-width: 1300px;
            width: 100%;
            margin: 30px auto;
            padding: 0 25px;
        }

        /* welcome card (simple) */
        .welcome-card {
            background: linear-gradient(125deg, #ffefdf, #ffe1ce);
            border-radius: 70px 12px 70px 12px;
            padding: 40px 50px;
            margin-bottom: 40px;
            border: 2px solid #f3b389;
            box-shadow: 0 20px 30px -12px #a86941;
        }

        .welcome-card h1 {
            font-size: 2.8rem;
            color: #2e1a0b;
            font-weight: 600;
        }

        .welcome-card p {
            font-size: 1.3rem;
            color: #6f452b;
        }

        /* content cards grid (example) */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

        .info-card {
            background: white;
            border-radius: 40px 8px 40px 8px;
            padding: 28px 22px;
            box-shadow: 0 15px 25px -10px #b18364;
            border: 1px solid #f0cbb0;
            transition: 0.2s;
        }

        .info-card:hover {
            transform: translateY(-5px);
        }

        .info-card i {
            font-size: 2.4rem;
            color: #b75c2e;
            margin-bottom: 15px;
        }

        .info-card h3 {
            font-size: 1.7rem;
            margin-bottom: 8px;
            color: #351f12;
        }

        .info-card p {
            color: #7f5a40;
        }

        /* mini gallery */
        .mini-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0 50px;
        }

        .gallery-item {
            background: #f1daca;
            height: 130px;
            border-radius: 30px 6px 30px 6px;
            background-size: cover;
            background-position: center;
            background-color: #ddb99b;
            background-blend-mode: overlay;
            display: flex;
            align-items: flex-end;
            padding: 12px;
            color: #2d1d11;
            font-weight: 600;
            text-shadow: 0 2px 4px white;
            border: 2px solid #cb8f64;
        }

        /* hand image backgrounds */
        .hand-1 { background-image: url('https://mehndidesignlist.com/wp-content/uploads/2025/06/royal-dulhan-mehndi-design.jpg'); }
        .hand-2 { background-image: url('https://www.kurtiblouse.com/wp-content/uploads/2018/10/Rajasthani-Traditional-Bridal-Henna-Mehndi-Design-1.jpg'); }
        .hand-3 { background-image: url('https://i.pinimg.com/736x/ce/a7/d1/cea7d1310bc1d987aa64792f3fccd0fb.jpg'); }
        .hand-4 { background-image: url('https://png.pngtree.com/png-vector/20240321/ourmid/pngtree-simple-arabic-mehndi-design-images-photos-png-image_12189506.png'); }

        /* ========== FOOTER ========== */
        .footer {
            background: #241a12;
            color: #e4c6ab;
            padding: 40px 30px 20px;
            border-top: 8px solid #be7a4c;
            margin-top: 40px;
        }

        .footer-container {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 40px;
        }

        .footer-col h4 {
            color: #f0b186;
            font-size: 1.4rem;
            margin-bottom: 16px;
            border-left: 6px solid #bc693b;
            padding-left: 12px;
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col li {
            margin: 12px 0;
        }

        .footer-col a {
            color: #e5bfa0;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-col a:hover {
            color: #ffc49b;
        }

        .social-links {
            display: flex;
            gap: 18px;
            margin-top: 20px;
        }

        .social-links a {
            background: #4d3627;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #f2bc90;
        }

        .social-links a:hover {
            background: #9f623f;
            color: white;
        }

        .footer-bottom {
            text-align: center;
            border-top: 2px solid #4f3a28;
            margin-top: 40px;
            padding-top: 25px;
            color: #b28868;
        }

        /* responsive */
        @media (max-width: 700px) {
            .nav-right .nav-link {
                display: none;
            }
            .menu-toggle span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- ========== TOP NAVIGATION BAR ========== -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-left">
                <div class="logo-group">

                        <i class="fas fa-hand-fist"></i>

                    <div class="logo-text">

                <button class="menu-toggle" id="openSidebarBtn">

        </div>
    </aside>
