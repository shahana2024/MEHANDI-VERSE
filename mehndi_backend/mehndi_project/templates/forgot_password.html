<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MehndiVerse · forgot password</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8efe6;  /* warm mehndi background */
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* subtle mehndi pattern overlay (very light) */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.03"><path d="M20,30 Q35,15 50,30 T80,30" stroke="%23945f38" fill="none" stroke-width="2"/><circle cx="30" cy="50" r="8" fill="%23945f38"/><circle cx="70" cy="50" r="8" fill="%23945f38"/><path d="M40,70 Q50,85 60,70" stroke="%23945f38" fill="none" stroke-width="2"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
        }

        .forgot-card {
            background: #ffffffec;
            backdrop-filter: blur(12px);
            border-radius: 80px 16px 80px 16px;
            box-shadow: 0 30px 45px -20px #784f31, 0 10px 0 0 #c77949 inset;
            border: 2px solid #cf8b5e;
            padding: 55px 50px;
            width: 100%;
            max-width: 550px;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .forgot-card:hover {
            transform: translateY(-6px);
        }

        /* logo / header */
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #bc6137, #dF7a4a);
            border-radius: 30px 6px 30px 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 0 #7f4023;
        }

        .logo-icon i {
            font-size: 38px;
            color: #fff3e0;
        }

        .logo-text h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #562f18;
            line-height: 1.2;
        }

        .logo-text span {
            font-size: 14px;
            color: #a47558;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .title {
            text-align: center;
            margin: 30px 0 15px;
        }

        .title h2 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #351f12;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .title h2 i {
            color: #bc6137;
            background: #f4d9c4;
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 5px 0 #c27647;
        }

        .subhead {
            text-align: center;
            color: #6f4b31;
            font-size: 1.2rem;
            margin-bottom: 35px;
            padding: 0 20px;
        }

        .subhead i {
            color: #b75c2e;
        }

        /* form styling */
        .forgot-form {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-top: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group label {
            font-weight: 600;
            color: #4a2c1a;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 8px;
        }

        .input-group label i {
            color: #bc6137;
            width: 28px;
            font-size: 1.3rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.input-icon {
            position: absolute;
            left: 22px;
            color: #bc6137;
            font-size: 1.3rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 18px 25px 18px 58px;
            border-radius: 60px 10px 60px 10px;
            border: 2px solid #c28053;
            font-size: 1.15rem;
            background: #fffcf5;
            transition: 0.2s;
            box-shadow: 0 6px 0 #e2c3aa;
        }

        .input-wrapper input:focus {
            border-color: #9d471b;
            box-shadow: 0 0 0 4px #f0cdb2, 0 6px 0 #c19b7c;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: #b1937a;
            font-style: italic;
        }

        /* button styling */
        .btn-submit {
            background: #bc6137;
            color: white;
            border: none;
            padding: 18px 25px;
            border-radius: 80px 10px 80px 10px;
            font-size: 1.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            border-bottom: 8px solid #7f4023;
            transition: 0.15s;
            width: 100%;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background: #d17040;
            transform: translateY(-4px);
            border-bottom-width: 10px;
        }

        .btn-submit i {
            font-size: 1.5rem;
            color: #ffddbb;
        }

        /* extra links (back to login) */
        .extra-links {
            display: flex;
            justify-content: center;
            margin-top: 35px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .extra-links a {
            color: #784f31;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            border-radius: 40px 6px 40px 6px;
            background: #edd9c5;
            border: 1px solid #ba7b4b;
            transition: 0.2s;
            font-size: 1rem;
        }

        .extra-links a:hover {
            background: #e0c0a3;
            transform: scale(1.02);
            border-color: #9f5f34;
        }

        .footer-note {
            margin-top: 30px;
            color: #8e623f;
            font-size: 0.9rem;
            text-align: center;
            border-top: 2px dashed #deb887;
            padding-top: 25px;
        }

        .footer-note i {
            color: #b56738;
        }

        /* simple responsive */
        @media (max-width: 500px) {
            .forgot-card {
                padding: 35px 25px;
            }
            .title h2 {
                font-size: 1.8rem;
            }
            .logo-text h1 {
                font-size: 2rem;
            }
            .btn-submit {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="forgot-card">
        <!-- logo area (mehndi verse branding) -->
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-hand-fist"></i>
            </div>
            <div class="logo-text">
                <h1>mehndiVerse</h1>
                <span>password recovery</span>
            </div>
        </div>

        <div class="title">
            <h2>
                <i class="fas fa-lock"></i>
                forgot password?
            </h2>
        </div>
        <div class="subhead">
            <i class="fas fa-envelope-open-text"></i> enter your email address to receive reset instructions
        </div>

        <!-- forgot password form -->
        <form action="/myapp/forgot_password/" method="POST" class="forgot-form">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> email address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" name="email" placeholder="your@email.com" required autofocus>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane"></i> send reset link
            </button>
        </form>

        <!-- additional helpful links -->
        <div class="extra-links">
            <a href="/myapp/login_get/"><i class="fas fa-sign-in-alt"></i> back to login</a>
        </div>

        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> we'll send a secure link to reset your password
        </div>
    </div>

    <!-- small footer note (optional) -->
    <div style="margin-top: 30px; color:#a47558; font-size:0.9rem; z-index:5; position:relative;">
        <i class="fas fa-leaf"></i> mehndiVerse · artistry at your fingertips
    </div>

</body>
</html>
