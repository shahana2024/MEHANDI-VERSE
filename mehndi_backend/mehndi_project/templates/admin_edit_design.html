<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MehndiVerse · edit recommendation</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8efe6;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #2e1c12;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* main content */
        .edit-container {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 30px auto 40px;
            padding: 0 25px;
        }

        /* page header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-header h1 {
            font-size: 2.6rem;
            font-weight: 600;
            color: #351f12;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .page-header h1 i {
            color: #bc6137;
            background: #f4d9c4;
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 6px 0 #c27647;
        }

        .back-link {
            background: #e5cfbc;
            padding: 12px 25px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 550;
            border: 2px solid #b9794d;
            box-shadow: 0 5px 0 #8d5836;
            color: #2f1d10;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .back-link:hover {
            background: #daba9c;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #6f422a;
        }

        /* edit form card */
        .edit-card {
            background: white;
            border-radius: 70px 12px 70px 12px;
            padding: 45px 50px;
            border: 3px solid #cf8b5e;
            box-shadow: 0 25px 35px -15px #9f6843;
            margin-top: 20px;
        }

        .form-title {
            font-size: 2rem;
            color: #562f18;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 10px solid #c16633;
            padding-left: 20px;
        }

        .form-title i {
            color: #bc6137;
        }

        /* form grid */
        .edit-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 180px 1fr;
            align-items: center;
            gap: 20px;
        }

        .form-row label {
            font-weight: 600;
            color: #4a2c1a;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-row label i {
            color: #bc6137;
            width: 28px;
            font-size: 1.3rem;
        }

        .form-control {
            padding: 16px 22px;
            border-radius: 50px 6px 50px 6px;
            border: 2px solid #c28053;
            font-size: 1.1rem;
            background: #fffcf5;
            transition: 0.2s;
            width: 100%;
        }

        .form-control:focus {
            border-color: #9d471b;
            box-shadow: 0 0 0 4px #f0cdb2;
            outline: none;
        }

        .file-input {
            padding: 12px 0;
            background: transparent;
            border: none;
            border-radius: 0;
        }

        .file-input:focus {
            box-shadow: none;
            border: none;
        }

        /* current image preview */
        .image-preview {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            background: #fcf2e7;
            padding: 20px;
            border-radius: 50px 8px 50px 8px;
            margin-bottom: 10px;
            border: 1px dashed #b56738;
        }

        .preview-img {
            width: 80px;
            height: 80px;
            border-radius: 30px 6px 30px 6px;
            object-fit: cover;
            border: 3px solid #bb693c;
        }

        .preview-note {
            color: #784f31;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* action buttons */
        .action-group {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            border-top: 2px solid #f0cdb2;
            padding-top: 35px;
            justify-content: flex-end;
        }

        .btn {
            padding: 16px 35px;
            border-radius: 60px 6px 60px 6px;
            font-weight: 600;
            font-size: 1.2rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.15s;
            border: 2px solid transparent;
            box-shadow: 0 6px 0 #7e462b;
            cursor: pointer;
            border: none;
        }

        .btn-save {
            background: #2c6e3c;
            color: white;
            border-bottom: 6px solid #1e5629;
        }

        .btn-save i { color: #c6ffb0; }

        .btn-cancel {
            background: #886542;
            color: white;
            border-bottom: 6px solid #62492f;
        }

        .btn-cancel i { color: #ffe2b3; }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 8px 0 #5f3521;
        }

        /* responsive */
        @media (max-width: 700px) {
            .edit-card {
                padding: 30px 25px;
            }
            .form-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .page-header {
                flex-direction: column;
                align-items: start;
            }
            .action-group {
                flex-direction: column;
            }
        }

        .footer {
            margin-top: 0;
        }
    </style>
</head>
<body>

    <!-- ========== MEHNDI VERSE ADMIN HEADER ========== -->
    {% include 'admin_header.html' %}

    <!-- ========== EDIT RECOMMENDATION SECTION ========== -->
    <main class="edit-container">
        <div class="page-header">
            <h1>
                <i class="fas fa-pen-fancy"></i> 
                edit recommendation
            </h1>
            <a href="javascript:history.back()" class="back-link"><i class="fas fa-arrow-left"></i> go back</a>
        </div>

        <div class="edit-card">
            <div class="form-title">
                <i class="fas fa-paint-brush"></i> update design details
            </div>

            <!-- edit form -->
            <form action="/myapp/admin_edit_recommend_post/" method="post" enctype="multipart/form-data" class="edit-form">
                {% csrf_token %}
                <input type="hidden" name="id" value="{{ data.id }}">
                <!-- name field -->
                <div class="form-row">
                    <label><i class="fas fa-tag"></i> name</label>
                    <input type="text" name="name" class="form-control" value="{{ data.name }}" required>
                </div>

                <!-- image field with current image preview -->
                <div class="form-row">
                    <label><i class="fas fa-image"></i> image</label>
                    <div style="flex:1;">
                        {% if data.design_image %}
                        <div class="image-preview">
                            <img src="{{ data.design_image }}" alt="current design" class="preview-img">
                            <span class="preview-note"><i class="fas fa-info-circle"></i> current image – upload new to replace</span>
                        </div>
                        {% endif %}
                        <input type="file" name="image" class="form-control file-input" accept="image/*">
                        <small style="color:#886e54; margin-top:5px; display:block;"><i class="fas fa-upload"></i> leave empty to keep current image</small>
                    </div>
                </div>

                <!-- style field -->
                <div class="form-row">
                    <label><i class="fas fa-palette"></i> style</label>
                    <input type="text" name="style" class="form-control" value="{{ data.style }}" required>
                </div>

                <!-- palm_width_ratio field -->
                <div class="form-row">
                    <label><i class="fas fa-arrows-left-right"></i> palm width ratio</label>
                    <input type="text" name="palm_width_ratio" class="form-control" value="{{ data.palm_width_ratio }}" required>
                </div>

                <!-- finger_length_ratio field -->
                <div class="form-row">
                    <label><i class="fas fa-arrows-up-down"></i> finger length ratio</label>
                    <input type="text" name="finger_length_ratio" class="form-control" value="{{ data.finger_length_ratio }}" required>
                </div>

                <!-- hidden field for id (if needed) -->
                <input type="hidden" name="id" value="{{ data.id }}">

                <!-- action buttons -->
                <div class="action-group">
                    <button type="submit" class="btn btn-save"><i class="fas fa-save"></i> save changes</button>
                    <a href="javascript:history.back()" class="btn btn-cancel"><i class="fas fa-times"></i> cancel</a>
                </div>
            </form>
        </div>
    </main>

    <!-- ========== FOOTER ========== -->
    {% include 'footer.html' %}

</body>
</html>
