<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MehndiVerse · artist login</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
            background: #fffaf4;
            color: #2e1c12;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* USING YOUR SPECIFIED BACKGROUND IMAGE */
            background: linear-gradient(145deg, rgba(250, 240, 230, 0.8), rgba(230, 200, 175, 0.75)), 
                        url('https://mehndidesignlist.com/wp-content/uploads/2025/06/royal-dulhan-mehndi-design.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* main login card */
        .login-card {
            max-width: 460px;
            width: 100%;
            background: rgba(255, 250, 240, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px 16px 48px 16px;
            box-shadow: 0 30px 45px -20px #8f5a42, 0 8px 0 #bb774e inset, 0 8px 20px rgba(100, 45, 10, 0.3);
            padding: 40px 35px;
            border: 2px solid #f5c9ad;
            transition: transform 0.2s;
        }

        .login-card:hover {
            transform: scale(1.01);
        }

        /* henna motif decoration */
        .motif {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #b45f34;
            font-size: 1.4rem;
            opacity: 0.8;
        }

        .motif i {
            filter: drop-shadow(0 4px 4px #e5bc9d);
        }

        h2 {
            text-align: center;
            font-size: 2.8rem;
            font-weight: 650;
            color: #3b1e0e;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .sub-head {
            text-align: center;
            color: #976b4f;
            margin-bottom: 35px;
            font-size: 1.1rem;
            border-bottom: 2px dashed #dbaa83;
            padding-bottom: 20px;
        }

        .sub-head i {
            color: #cf6a38;
        }

        /* form fields */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 550;
            color: #4f2f1a;
            font-size: 1.1rem;
            margin-left: 8px;
        }

        .input-group label i {
            color: #c16834;
            width: 24px;
        }

        .input-field {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            border: 2px solid #f3cdb1;
            transition: 0.2s;
            padding: 0 20px;
            box-shadow: 0 8px 12px -8px #cb9f83 inset;
        }

        .input-field i {
            color: #b1592c;
            font-size: 1.2rem;
            width: 30px;
        }

        .input-field input {
            width: 100%;
            padding: 18px 8px 18px 0;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            color: #2f1b0e;
            outline: none;
        }

        .input-field input::placeholder {
            color: #bc927b;
            font-weight: 300;
        }

        .input-field:focus-within {
            border-color: #cb6f3d;
            box-shadow: 0 0 0 4px #fbe1cf;
        }

        /* login button */
        .login-btn {
            background: linear-gradient(125deg, #b4572c, #d57142);
            width: 100%;
            padding: 18px 20px;
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 1.7rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            box-shadow: 0 16px 20px -10px #b4572c, 0 4px 0 #773d20;
            transition: 0.15s;
            margin-top: 20px;
            border: 1px solid #fbc8a6;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 25px -10px #b4572c, 0 6px 0 #773d20;
        }

        .login-btn:active {
            transform: translateY(4px);
            box-shadow: 0 10px 15px -8px #9a4d2b;
        }

        /* extra links */
        .extra-links {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            font-size: 1rem;
            flex-wrap: wrap;
            gap: 12px;
        }

        .extra-links a {
            color: #8c583a;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px dotted #d29872;
        }

        .extra-links a:hover {
            color: #c75f2a;
            border-bottom-color: #c75f2a;
        }

        .register-section {
            margin-top: 30px;
            text-align: center;
            background: #fae5d6;
            padding: 18px;
            border-radius: 60px;
            border: 2px solid #e1b693;
        }

        .register-section p {
            color: #573c29;
        }

        .register-section a {
            color: #b14717;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border-bottom: 2px solid #b85f2e;
        }

        .register-section a:hover {
            color: #7b3716;
        }

        /* artist quote */
        .footer-note {
            text-align: center;
            margin-top: 25px;
            color: #956f52;
            font-size: 0.9rem;
        }

        .footer-note i {
            color: #be5627;
        }

        /* responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            h2 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- decorative mehndi motif -->
        <div class="motif">
            <i class="fas fa-leaf"></i>
            <i class="fas fa-hand-fist"></i>
            <i class="fas fa-leaf"></i>
        </div>

        <h2>Login</h2>
        <div class="sub-head">
            <i class="fas fa-palette"></i> mehndiVerse · henna hub
        </div>

        <!-- login form (username, password) - now submitting correctly -->
        <form action="/myapp/login_post/" method="post" id="loginForm">
            <!-- username field -->
            <div class="input-group">
                <label for="username"><i class="fas fa-user-pen"></i> username</label>
                <div class="input-field">
                    <i class="fas fa-feather"></i>
                    <input type="text" id="username" name="username" placeholder="artist name or email" required>
                </div>
            </div>

            <!-- password field -->
            <div class="input-group">
                <label for="password"><i class="fas fa-lock"></i> password</label>
                <div class="input-field">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <!-- login button (now type="submit" works naturally) -->
            <button type="submit" class="login-btn">
                <i class="fas fa-arrow-right-to-bracket"></i> login
            </button>

            <!-- extra helpful links -->
            <div class="extra-links">
                <a href="/myapp/forgot_password_get/"><i class="fas fa-rotate-left"></i> forgot password?</a>
                <a href="#"><i class="fas fa-circle-info"></i> help</a>
            </div>
        </form>

        <div class="footer-note">
            <i class="fas fa-leaf"></i> connect · inspire · create <i class="fas fa-leaf"></i>
        </div>
    </div>

    <!-- REMOVED the problematic script that was preventing form submission -->
    <!-- The button will now submit the form to /myapp/login_post/ as intended -->
</body>
</html>
